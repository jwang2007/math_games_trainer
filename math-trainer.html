<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Math Games Trainer — 24 & SET</title>
<style>
  :root{
    --blue:#3D3B9E; --blue-deep:#2E2C82;
    --gold:#E8C43C; --gold-deep:#CBA420;
    --ink:#141210; --magenta:#D81E63; --magenta-deep:#A9114C;
    --white:#fff; --cream:#FBF3DA; --muted:#C9CEEB; --ray-red:#E8362E;
    --green:#2FA84F; --purple:#6E56CF;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%}
  body{
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    color:var(--ink);
    background:radial-gradient(130% 130% at 50% 0%, var(--blue) 0%, var(--blue-deep) 100%);
  }
  #root{min-height:100vh}
  .field{position:relative;padding:30px 22px 40px;min-height:100vh}
  /* paired corner rivets, like the sign */
  .rivets{position:absolute;display:flex;gap:9px}
  .rivets.tl{top:16px;left:16px}.rivets.tr{top:16px;right:16px}
  .rivets.bl{bottom:16px;left:16px}.rivets.br{bottom:16px;right:16px}
  .rivet{width:11px;height:11px;border-radius:50%;background:var(--magenta);box-shadow:0 1px 2px rgba(0,0,0,.4)}
  .rivet.pale{background:#E9648F}

  .plate{max-width:720px;margin:0 auto;background:var(--cream);border-radius:22px;padding:26px;
    box-shadow:0 20px 60px rgba(0,0,0,.4)}

  .head{display:flex;align-items:center;gap:16px;margin-bottom:20px}
  .badge{position:relative;width:70px;height:70px;flex:0 0 70px;border-radius:50%;background:var(--gold);
    display:grid;place-items:center;overflow:hidden;box-shadow:inset 0 0 0 3px var(--gold-deep)}
  .badge svg{position:absolute;inset:0;width:100%;height:100%}
  .badge .num{position:relative;z-index:1;font-family:Georgia,"Times New Roman",serif;font-weight:700;
    font-size:23px;color:var(--ink);background:var(--white);width:36px;height:36px;border-radius:6px;
    display:grid;place-items:center;box-shadow:0 0 0 2px var(--magenta)}
  .head h1{margin:0;font-family:Georgia,"Times New Roman",serif;font-size:28px;letter-spacing:-.5px;color:var(--blue-deep)}
  .head p{margin:3px 0 0;color:#6B6455;font-size:13px}

  .tabs{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .tab{background:#fff;border:2px solid var(--gold-deep);border-radius:12px;padding:9px 16px;cursor:pointer;
    text-align:left;color:var(--ink);font:inherit;transition:transform .1s,background .15s,color .15s}
  .tab:hover{transform:translateY(-1px)}
  .tab[data-active="true"]{background:var(--blue-deep);border-color:var(--blue-deep);color:#fff}
  .tab[data-active="true"] .tag{color:var(--muted)}
  .tab .nm{display:block;font-weight:800;font-size:18px;font-family:Georgia,serif}
  .tab .tag{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:#6B6455}
  .tab.soon{opacity:.55;cursor:default;border-style:dashed;border-color:#C9B98A}

  .stage{background:#fff;border:2px solid var(--gold-deep);border-radius:16px;padding:22px;min-height:400px}
  .game{display:flex;flex-direction:column}

  .stripbar{display:flex;gap:10px;margin-bottom:20px}
  .stat{flex:1;background:var(--cream);border:1.5px solid var(--gold-deep);border-radius:12px;padding:10px 12px;text-align:center}
  .stat .v{font-size:24px;font-weight:800;line-height:1;font-family:Georgia,serif;color:var(--ink)}
  .stat .l{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#6B6455;margin-top:4px}

  /* ---- 24 disc ---- */
  .disc-wrap{display:flex;justify-content:center;margin-bottom:14px}
  .disc-outer{position:relative;width:330px;height:330px;max-width:84vw;max-height:84vw}
  .disc{position:absolute;inset:0;border-radius:50%;background:var(--gold);
    box-shadow:0 0 0 12px var(--blue-deep),inset 0 0 0 3px var(--gold-deep)}
  .disc svg{overflow:visible}
  .disc svg{position:absolute;inset:0;width:100%;height:100%}
  .center-sq{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(45deg);width:15%;height:15%;
    background:#fff;box-shadow:0 0 0 3px var(--ray-red)}
  .numeral{position:absolute;border:none;background:transparent;white-space:nowrap;line-height:1;
    font-family:Georgia,"Times New Roman",serif;font-weight:700;font-size:clamp(54px,15vw,80px);
    color:var(--ink);width:80px;height:80px;display:grid;place-items:center;z-index:2;
    transform:rotate(var(--rot));transition:transform .12s,color .12s;
    text-shadow:0 1px 0 rgba(255,255,255,.35)}
  
  
  .numeral.ne{top:14%;right:11%}
  .numeral.se{bottom:14%;right:11%}
  .numeral.sw{bottom:14%;left:11%}
  .numeral.nw{top:14%;left:11%}
  .prompt{font-size:14px;color:#6B6455;margin:6px 0 14px;text-align:center}
  .prompt b{color:var(--blue-deep)}
  .diff-row{display:flex;gap:6px;justify-content:center;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .diff-label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:#6B6455;margin-right:2px}
  .diff-btn{border:1.5px solid var(--gold-deep);background:#fff;border-radius:20px;padding:5px 13px;
    font:inherit;font-size:12px;font-weight:700;cursor:pointer;color:#6B6455}
  .diff-btn[data-on="true"]{background:var(--blue-deep);border-color:var(--blue-deep);color:#fff}

  .exprinput{width:100%;padding:14px 16px;font-size:20px;border-radius:12px;border:2px solid var(--gold-deep);
    background:var(--cream);margin-bottom:12px;font-family:ui-monospace,"SF Mono",Menlo,monospace}
  .exprinput:focus{outline:none;border-color:var(--magenta);background:#fff}
  .ops{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .opbtn{min-width:46px;height:44px;border-radius:10px;border:2px solid var(--gold-deep);background:#fff;
    font-size:20px;font-weight:700;cursor:pointer;font-family:Georgia,serif}
  .opbtn:hover{border-color:var(--magenta);color:var(--magenta-deep)}
  .opbtn.clr{min-width:auto;padding:0 14px;font-size:13px;color:#6B6455;font-family:inherit}

  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn{padding:12px 20px;border-radius:11px;border:2px solid var(--blue-deep);background:#fff;font-weight:800;
    font-size:15px;cursor:pointer;color:var(--blue-deep);font-family:inherit;transition:transform .08s}
  .btn:hover{transform:translateY(-1px)}
  .btn.primary{background:var(--magenta);border-color:var(--magenta);color:#fff}
  .btn.primary:hover{background:var(--magenta-deep);border-color:var(--magenta-deep)}
  .btn.ghost{border-color:var(--gold-deep);color:#6B6455}

  .msg{margin-top:16px;padding:12px 16px;border-radius:11px;font-size:14px;font-weight:600}
  .msg.ok{background:#E7F5EA;color:#1E7B37}
  .msg.err{background:#FCE3EA;color:var(--magenta-deep)}
  .sol{margin-top:12px;font-size:14px;color:#6B6455}
  .sol code{background:var(--cream);border:1px solid var(--gold-deep);padding:3px 8px;border-radius:6px}

  /* ---- SET ---- */
  /* ---- 24 equation history ---- */
  .eqlog{display:flex;flex-direction:column;gap:6px;align-items:center;margin:0 0 16px}
  .eqline{font-family:Georgia,serif;font-weight:700;font-size:20px;color:var(--blue-deep);
    background:var(--cream);border:1.5px solid var(--gold-deep);border-radius:9px;padding:5px 16px}

  /* ---- 24 disc number tiles (interactive numerals on the wheel) ---- */
  .ntile[data-len="2"]{font-size:clamp(38px,10vw,54px)}
  .ntile[data-len="3"]{font-size:clamp(28px,7.5vw,40px)}
  .ntile{cursor:pointer;border-radius:10px;
    transition:transform .12s,color .12s,background .12s,box-shadow .12s;
    -webkit-user-select:none;user-select:none}
  .ntile:not([data-empty="true"]):hover{color:var(--magenta-deep);
    transform:rotate(var(--rot)) scale(1.1)}
  .ntile[data-sel="true"]{color:var(--blue-deep);transform:rotate(var(--rot)) scale(1.12)}
  .ntile[data-over="true"]{color:var(--ray-red);transform:rotate(var(--rot)) scale(1.1)}
  .ntile[data-empty="true"]{cursor:default;pointer-events:none;opacity:0}

  /* ---- 24 operator coins ---- */
  .opsrow{display:flex;gap:12px;justify-content:center;margin-bottom:18px}
  .opcoin{
    width:52px;height:52px;border-radius:50%;border:2.5px solid var(--gold-deep);
    background:#fff;font-size:26px;font-weight:800;font-family:Georgia,serif;cursor:pointer;
    color:var(--blue-deep);display:grid;place-items:center;line-height:1;
    transition:transform .1s,background .12s,color .12s,border-color .12s;opacity:.55}
  .opcoin[data-live="true"]{opacity:1}
  .opcoin:hover{transform:translateY(-2px)}
  .opcoin[data-on="true"]{background:var(--blue-deep);border-color:var(--blue-deep);color:#fff}
  .btn:disabled{opacity:.4;cursor:default;transform:none}

  .setgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
  @media(max-width:520px){.setgrid{grid-template-columns:repeat(3,1fr)}}
  .setcard{background:#fff;border:2px solid var(--gold-deep);border-radius:12px;aspect-ratio:3/2;cursor:pointer;
    padding:0;display:grid;place-items:center;transition:transform .1s,border-color .12s,box-shadow .12s}
  .setcard:hover{transform:translateY(-2px)}
  .setcard[data-selected="true"]{border-color:var(--blue-deep);box-shadow:0 0 0 3px rgba(61,59,158,.27)}
  .setcard[data-wrong="true"]{border-color:var(--magenta);animation:shake .4s}
  .setcard[data-hint="true"]{border-color:var(--magenta);box-shadow:0 0 0 3px rgba(216,30,99,.27)}
  .setcard .inner{display:flex;flex-direction:column;gap:4px;align-items:center}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

  .rules{margin-top:18px;font-size:14px;color:#6B6455}
  .rules summary{cursor:pointer;font-weight:800;color:var(--blue-deep);font-family:Georgia,serif}
  .rules p{margin:8px 0 0;line-height:1.55}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:18px}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo, useCallback, useRef } = React;

const GAMES = [
  { id:"twentyfour", name:"24", tag:"arithmetic" },
  { id:"set", name:"SET", tag:"pattern logic" },
];

/* ---------- petals: four solid magenta kite petals radiating from the
   center, each overlaid with ~9 pale stripes, like the 24 app icon ---------- */
function Rays({ clip=true, inner=10, outer=50.5, halfw=20, n=9 }){
  const cx=50, cy=50;
  const petalPath=(dir)=>{
    const a=dir*Math.PI/180;
    const ix=cx+Math.cos(a)*inner, iy=cy+Math.sin(a)*inner;
    const ox=cx+Math.cos(a)*outer, oy=cy+Math.sin(a)*outer;
    const mid=inner+(outer-inner)*0.62;
    const la=(dir-halfw)*Math.PI/180, ra=(dir+halfw)*Math.PI/180;
    const lx=cx+Math.cos(la)*mid, ly=cy+Math.sin(la)*mid;
    const rx=cx+Math.cos(ra)*mid, ry=cy+Math.sin(ra)*mid;
    return `M${ix.toFixed(2)} ${iy.toFixed(2)} L${lx.toFixed(2)} ${ly.toFixed(2)} L${ox.toFixed(2)} ${oy.toFixed(2)} L${rx.toFixed(2)} ${ry.toFixed(2)} Z`;
  };
  const stripeLines=(dir)=>{
    const a=dir*Math.PI/180;
    const ix=cx+Math.cos(a)*inner, iy=cy+Math.sin(a)*inner;
    const out=[];
    for(let i=0;i<n;i++){
      const t=i/(n-1); const off=(-1+2*t);
      const ang=(dir+off*(halfw*0.78))*Math.PI/180;
      const r=outer*0.95 - Math.abs(off)*(outer*0.26);
      out.push([ix,iy, cx+Math.cos(ang)*r, cy+Math.sin(ang)*r]);
    }
    return out;
  };
  const dirs=[270,0,90,180];
  const cid="rayclip-"+Math.random().toString(36).slice(2,7);
  let k=0;
  return (<svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden>
    {clip && <defs><clipPath id={cid}><circle cx="50" cy="50" r="49.5"/></clipPath></defs>}
    <g clipPath={clip?`url(#${cid})`:undefined}>
      {dirs.map(d=>(<path key={"p"+d} d={petalPath(d)} fill="var(--ray-red)" />))}
      {dirs.map(d=>stripeLines(d).map(([x1,y1,x2,y2])=>(
        <line key={"l"+(k++)} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#F7DCDC" strokeWidth="0.5" />
      )))}
    </g>
  </svg>);
}

/* ---------- 24 logic ---------- */
const EPS=1e-6;
function solve24(nums){
  function go(items){
    if(items.length===1) return Math.abs(items[0].v-24)<EPS?items[0].e:null;
    for(let i=0;i<items.length;i++)for(let j=0;j<items.length;j++){
      if(i===j)continue;
      const a=items[i],b=items[j];
      const rest=items.filter((_,k)=>k!==i&&k!==j);
      const cands=[{v:a.v+b.v,e:`(${a.e} + ${b.e})`},{v:a.v*b.v,e:`(${a.e} × ${b.e})`},{v:a.v-b.v,e:`(${a.e} - ${b.e})`}];
      if(Math.abs(b.v)>EPS)cands.push({v:a.v/b.v,e:`(${a.e} / ${b.e})`});
      for(const c of cands){const r=go([...rest,c]);if(r)return r;}
    }
    return null;
  }
  return go(nums.map(n=>({v:n,e:String(n)})));
}
// count how many of the 4! orderings / operator combos yield 24 -> a rough difficulty proxy
function solutionCount(nums){
  let found=0;
  const ops=['+','-','*','/'];
  const perms=[];
  const p=(arr,m=[])=>{ if(!arr.length){perms.push(m);return;} for(let i=0;i<arr.length;i++){p(arr.slice(0,i).concat(arr.slice(i+1)),m.concat(arr[i]));}};
  p(nums);
  const apply=(x,y,o)=>o==='+'?x+y:o==='-'?x-y:o==='*'?x*y:(Math.abs(y)<EPS?NaN:x/y);
  for(const [a,b,c,d] of perms){
    for(const o1 of ops)for(const o2 of ops)for(const o3 of ops){
      const forms=[
        apply(apply(apply(a,b,o1),c,o2),d,o3),
        apply(apply(a,b,o1),apply(c,d,o3),o2),
        apply(a,apply(apply(b,c,o2),d,o3),o1),
        apply(a,apply(b,apply(c,d,o3),o2),o1),
        apply(apply(a,apply(b,c,o2),o1),d,o3),
      ];
      for(const f of forms) if(isFinite(f)&&Math.abs(f-24)<EPS) found++;
    }
  }
  return found;
}
function genPuzzle24(diff){
  // diff: 'easy'|'med'|'hard'|'any'  -> filter by solution abundance
  for(let t=0;t<6000;t++){
    const nums=Array.from({length:4},()=>1+Math.floor(Math.random()*9));
    const sol=solve24(nums);
    if(!sol) continue;
    if(diff==='any') return {nums,sol};
    const sc=solutionCount(nums);
    if(diff==='easy'  && sc>=40) return {nums,sol};
    if(diff==='med'   && sc>=8 && sc<40) return {nums,sol};
    if(diff==='hard'  && sc<8) return {nums,sol};
  }
  const nums=[4,6,1,1]; return {nums,sol:solve24(nums)};
}
function evalExpr(raw){
  if(!raw.trim()) return {ok:false,msg:""};
  const s=raw.replace(/×/g,"*").replace(/÷/g,"/");
  if(!/^[0-9+\-*/().\s]+$/.test(s)) return {ok:false,msg:"Only numbers and + − × ÷ ( ) allowed."};
  try{
    const v=Function(`"use strict";return (${s})`)();
    if(typeof v!=="number"||!isFinite(v)) return {ok:false,msg:"That doesn't compute."};
    return {ok:true,value:v};
  }catch{ return {ok:false,msg:"Unbalanced or invalid expression."}; }
}
function usesExactly(expr,nums){
  const found=(expr.match(/\d+/g)||[]).map(Number).sort((a,b)=>a-b);
  const need=[...nums].sort((a,b)=>a-b);
  return found.length===need.length && need.every((n,i)=>n===found[i]);
}

/* ---------- SET logic ---------- */
const SET_COLORS=["var(--magenta)","var(--green)","var(--purple)"];
const SET_SHADES=["solid","striped","open"];
const SET_SHAPES=["diamond","squiggle","pill"];
function allCards(){const cs=[];for(let n=1;n<=3;n++)for(let c=0;c<3;c++)for(let s=0;s<3;s++)for(let h=0;h<3;h++)cs.push({n,c,s,h});return cs;}
const keyOf=c=>c.n*27+c.c*9+c.s*3+c.h;
function isSet(a,b,c){const ok=(x,y,z)=>(x+y+z)%3===0;return ok(a.n-1,b.n-1,c.n-1)&&ok(a.c,b.c,c.c)&&ok(a.s,b.s,c.s)&&ok(a.h,b.h,c.h);}
function countSets(cards){const sets=[];for(let i=0;i<cards.length;i++)for(let j=i+1;j<cards.length;j++)for(let k=j+1;k<cards.length;k++)if(isSet(cards[i],cards[j],cards[k]))sets.push([i,j,k]);return {total:sets.length,sets};}
function dealBoard(size=12){const deck=allCards();for(let t=0;t<200;t++){for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}const b=deck.slice(0,size);if(countSets(b).total>0)return b;}return deck.slice(0,size);}
function SetSymbol({card,idx}){
  const color=SET_COLORS[card.c], shade=SET_SHADES[card.h];
  const stripeId=`st-${card.c}-${idx}-${Math.random().toString(36).slice(2,6)}`;
  let fill="none"; if(shade==="solid")fill=color; else if(shade==="striped")fill=`url(#${stripeId})`;
  const paths={
    diamond:"M40 4 L74 22 L40 40 L6 22 Z",
    pill:"M20 4 h40 a18 18 0 0 1 0 36 h-40 a18 18 0 0 1 0 -36 Z",
    squiggle:"M9 25 C9 15 21 11 32 15 C43 19 51 26 62 22 C69 19 72 13 73 19 C74 29 61 35 49 30 C37 25 29 19 19 23 C13 26 9 31 9 25 Z"
  };
  return (<svg viewBox="0 0 80 44" width="52" height="29" aria-hidden>
    <defs><pattern id={stripeId} width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="3" fill="white"/>
      <line x1="0" y1="0" x2="4" y2="0" stroke={color} strokeWidth="1.3"/>
    </pattern></defs>
    <path d={paths[SET_SHAPES[card.s]]} fill={fill} stroke={color} strokeWidth="2.6" strokeLinejoin="round"/>
  </svg>);
}
function SetCard({card,selected,wrong,hint,onClick}){
  return (<button className="setcard" data-selected={selected} data-wrong={wrong} data-hint={hint} aria-pressed={selected} onClick={onClick}>
    <div className="inner">{Array.from({length:card.n}).map((_,i)=><SetSymbol key={i} card={card} idx={i}/>)}</div>
  </button>);
}
function fmtTime(ms){const s=Math.floor(ms/1000);return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;}


/* ---------- 6/9 glyph: in the 24 game, 6 and 9 are the SAME serif shape; the only
   difference is the red-filled counter. No red hole = 6, red hole = 9 (this is how the
   game keeps them distinct when cards are read from any direction). Rendered as SVG text
   so it matches the same face as every other numeral; the red disc sits behind the glyph
   so the black ink masks it to exactly the counter. ---------- */
function SixNineGlyph({ nine=false, px=74 }){
  // Use the actual "6"/"9" serif glyph so each sits like every other numeral on
  // the wheel: the tile's CSS `--rot` rotates it so the base/tail points toward
  // the center square, just like 4, 7, etc. ONLY the 9 carries the red-filled
  // counter (hole at the TOP). The red fills the counter and is GUARANTEED to
  // stay inside the ink at every rotation by two layers: (1) a mask whose white
  // circle minus the black ink reveals exactly the counter, and (2) a clip
  // circle that caps how far the red can ever extend, so it can never poke past
  // the glyph even where the mask circle would overshoot a thin bowl wall.
  const ch = nine ? "9" : "6";
  const mid = "sixnine-m-" + Math.random().toString(36).slice(2,7);
  const cid = "sixnine-c-" + Math.random().toString(36).slice(2,7);
  return (
    <svg viewBox="0 0 100 120" height={px} width={px*0.83} style={{display:"block",overflow:"visible"}} aria-label={ch}>
      {nine && (
        <defs>
          <mask id={mid}>
            <circle cx="49" cy="50" r="16" fill="white" />
            <text x="50" y="60" fontFamily='Georgia,"Times New Roman",serif' fontWeight="700"
              fontSize="110" fill="black" textAnchor="middle" dominantBaseline="central">9</text>
          </mask>
          <clipPath id={cid}><circle cx="49" cy="50" r="13" /></clipPath>
        </defs>
      )}
      {nine && (
        <g clipPath={`url(#${cid})`}>
          <rect x="0" y="0" width="100" height="120" fill="var(--ray-red)" mask={`url(#${mid})`} />
        </g>
      )}
      <text x="50" y="60" fontFamily='Georgia,"Times New Roman",serif' fontWeight="700"
        fontSize="110" fill="var(--ink)" textAnchor="middle" dominantBaseline="central">{ch}</text>
    </svg>
  );
}

/* ---------- 24 view: tap the numbers ON THE DISC to combine them.
   The four disc positions hold the live values. Pick two numbers first — either
   tap one then another, or drag one disc number onto another — to stage a pair.
   Then tap an operator (row below) to combine them into one; the result stays in
   the second slot and the first empties. Reduce to a single value of 24 to win. ---------- */
function Game24(){
  const [diff,setDiff]=useState("any");
  const [puzzle,setPuzzle]=useState(()=>genPuzzle24("any"));
  const [solved,setSolved]=useState(0);
  const [attempts,setAttempts]=useState(0);
  const [streak,setStreak]=useState(0);
  const [start,setStart]=useState(()=>Date.now());
  const [showSol,setShowSol]=useState(false);
  const [status,setStatus]=useState({type:"idle",msg:""});
  const [log,setLog]=useState([]);   // equation history like "2 + 2 = 4"

  // 4 fixed slots; each slot holds {val} or null once merged away
  const makeSlots=(nums)=>nums.map((v)=>({val:v}));
  const [slotsState,setSlotsState]=useState(()=>makeSlots(puzzle.nums));
  const [history,setHistory]=useState([]);   // previous slotsState arrays
  const [sel,setSel]=useState(null);         // first-picked slot index (waiting for a second)
  const [pair,setPair]=useState(null);       // staged {a,b} pair, ready for an operator
  const [op,setOp]=useState(null);           // operator symbol
  const [dragIdx,setDragIdx]=useState(null);
  const [overIdx,setOverIdx]=useState(null);

  const liveCount=slotsState.filter(Boolean).length;

  const reset=useCallback((p=puzzle)=>{
    setSlotsState(makeSlots(p.nums)); setHistory([]); setLog([]); setSel(null); setPair(null); setOp(null);
    setStatus({type:"idle",msg:""}); setShowSol(false);
  },[puzzle]);
  const next=useCallback((d=diff)=>{
    const p=genPuzzle24(d);
    setPuzzle(p); setSlotsState(makeSlots(p.nums)); setHistory([]); setLog([]); setSel(null); setPair(null); setOp(null);
    setStatus({type:"idle",msg:""}); setShowSol(false); setStart(Date.now());
  },[diff]);
  const pickDiff=(d)=>{ setDiff(d); next(d); };

  const applyOp=(a,b,o)=> o==="+"?a+b : o==="-"?a-b : o==="×"?a*b : (Math.abs(b)<EPS?NaN:a/b);
  const pretty=(v)=> Number.isInteger(v)? String(v) : (+v.toFixed(3)+"");

  // combine slot i (first operand) with slot j (second), operator o.
  // result lands in slot j; slot i becomes null.
  const combine=(i,j,o)=>{
    if(i===j||o==null) return;
    const A=slotsState[i], B=slotsState[j];
    if(!A||!B) return;
    const res=applyOp(A.val,B.val,o);
    if(!isFinite(res)){ setStatus({type:"err",msg:"Can't divide by zero — pick a different move."}); return; }
    setHistory(h=>[...h,slotsState]);
    setLog(L=>[...L, `${pretty(A.val)} ${o} ${pretty(B.val)} = ${pretty(res)}`]);
    const nx=slotsState.map((s,idx)=> idx===i?null : idx===j?{val:res} : s);
    setSlotsState(nx); setSel(null); setPair(null); setOp(null);
    const live=nx.filter(Boolean);
    if(live.length===1){
      setAttempts(a=>a+1);
      if(Math.abs(live[0].val-24)<EPS){
        setStatus({type:"ok",msg:`Solved in ${fmtTime(Date.now()-start)}! That makes 24.`});
        setSolved(s=>s+1); setStreak(s=>s+1);
      }else{
        setStatus({type:"err",msg:`That leaves ${pretty(live[0].val)}, not 24. Undo or reset to retry.`});
        setStreak(0);
      }
    }else setStatus({type:"idle",msg:""});
  };

  const clickSlot=(i)=>{
    if(!slotsState[i]) return;        // empty slot ignore
    if(liveCount===1) return;
    // if a pair is already staged, a click starts a fresh selection
    if(pair){ setPair(null); setOp(null); setSel(i); setStatus({type:"idle",msg:""}); return; }
    if(sel===null){ setSel(i); return; }
    if(sel===i){ setSel(null); return; }        // tap the same one to deselect
    // second distinct number -> stage the pair, wait for an operator
    setPair({a:sel,b:i}); setSel(null); setStatus({type:"idle",msg:""});
  };
  const clickOp=(o)=>{ if(pair) combine(pair.a,pair.b,o); };

  const undo=()=>{
    setHistory(h=>{
      if(!h.length) return h;
      setSlotsState(h[h.length-1]); setLog(L=>L.slice(0,-1)); setSel(null); setPair(null); setOp(null); setStatus({type:"idle",msg:""});
      return h.slice(0,-1);
    });
  };

  // drag one disc number onto another -> stage the pair, then pick an operator
  const onDragStart=(e,i)=>{ if(!slotsState[i])return; setDragIdx(i); e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain",""+i);}catch(_){} };
  const onDragOver=(e,i)=>{ if(slotsState[i]&&i!==dragIdx){ e.preventDefault(); setOverIdx(i);} };
  const onDrop=(e,i)=>{ e.preventDefault(); const from=dragIdx; setDragIdx(null); setOverIdx(null);
    if(from==null||from===i||!slotsState[i]) return;
    setPair({a:from,b:i}); setSel(null); setOp(null); setStatus({type:"idle",msg:"Now tap an operator to combine."}); };
  const onDragEnd=()=>{ setDragIdx(null); setOverIdx(null); };

  const slots=[{cls:"ne",rot:45},{cls:"se",rot:135},{cls:"sw",rot:225},{cls:"nw",rot:315}];

  return (<div className="game">
    <div className="stripbar">
      <div className="stat"><div className="v">{solved}</div><div className="l">solved</div></div>
      <div className="stat"><div className="v">{attempts}</div><div className="l">attempts</div></div>
      <div className="stat"><div className="v" style={{color:"var(--magenta)"}}>{streak}</div><div className="l">streak</div></div>
    </div>

    <div className="diff-row">
      <span className="diff-label">difficulty</span>
      {[["any","Mixed"],["easy","Easy"],["med","Medium"],["hard","Hard"]].map(([k,lbl])=>(
        <button key={k} className="diff-btn" data-on={diff===k} onClick={()=>pickDiff(k)}>{lbl}</button>
      ))}
    </div>

    {/* the disc numbers ARE the tiles you tap */}
    <div className="disc-wrap"><div className="disc-outer">
      <div className="disc"><Rays clip={false} outer={53.5} /></div>
      <div className="center-sq" />
      
      {slots.map((s,i)=>{
        const cell=slotsState[i];
        return (
          <button key={i}
            className={"numeral ntile "+s.cls}
            style={{"--rot":s.rot+"deg"}}
            data-empty={!cell}
            data-sel={sel===i || (pair && (pair.a===i || pair.b===i))}
            data-over={overIdx===i}
            data-len={cell ? String(pretty(cell.val)).length : 1}
            draggable={!!cell && liveCount>1}
            onClick={()=>clickSlot(i)}
            onDragStart={(e)=>onDragStart(e,i)}
            onDragOver={(e)=>onDragOver(e,i)}
            onDragLeave={()=>setOverIdx(o=>o===i?null:o)}
            onDrop={(e)=>onDrop(e,i)}
            onDragEnd={onDragEnd}>
            {cell ? (cell.val===6 ? <SixNineGlyph px={74}/> : cell.val===9 ? <SixNineGlyph nine px={74}/> : pretty(cell.val)) : ""}
          </button>
        );
      })}
    </div></div>

    {log.length>0 && (
      <div className="eqlog">
        {log.map((e,idx)=>(<div key={idx} className="eqline">{e}</div>))}
      </div>
    )}

    {/* compact operator row (operators only — numbers live on the wheel).
        Flow: pick two numbers (tap two, or drag one onto another) to stage a
        pair, THEN tap an operator to combine them. */}
    <div className="opsrow">
      {["+","-","×","÷"].map(o=>(
        <button key={o} className="opcoin" data-on={op===o} data-live={!!pair} onClick={()=>clickOp(o)} title={pair?"combine the staged pair":"pick two numbers first"}>{o}</button>
      ))}
    </div>

    <div className="actions">
      <button className="btn ghost" onClick={undo} disabled={!history.length}>↶ Undo</button>
      <button className="btn ghost" onClick={()=>reset()}>Reset</button>
      <button className="btn" onClick={()=>setShowSol(s=>!s)}>{showSol?"Hide answer":"Show answer"}</button>
      <button className="btn primary" onClick={()=>next()}>New puzzle →</button>
    </div>

    {status.type!=="idle" && <div className={"msg "+status.type}>{status.msg}</div>}
    {showSol && <div className="sol">One solution: <code>{puzzle.sol.replace(/^\(|\)$/g,"")} = 24</code></div>}
  </div>);
}

/* ---------- SET view ---------- */
function GameSet(){
  const [board,setBoard]=useState(()=>dealBoard(12));
  const [sel,setSel]=useState([]);
  const [wrong,setWrong]=useState([]);
  const [found,setFound]=useState(0);
  const [misses,setMisses]=useState(0);
  const [hintIdx,setHintIdx]=useState([]);
  const [flash,setFlash]=useState({type:"idle",msg:""});
  const info=useMemo(()=>countSets(board),[board]);

  const newBoard=()=>{ setBoard(dealBoard(12)); setSel([]); setWrong([]); setHintIdx([]); setFlash({type:"idle",msg:""}); };
  const replaceFound=(idxs)=>{
    const used=new Set(board.map(keyOf));
    const pool=allCards().filter(c=>!used.has(keyOf(c)));
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    const nb=[...board]; idxs.forEach((ix,k)=>{nb[ix]=pool[k]||nb[ix];});
    if(countSets(nb).total===0){ newBoard(); return; }
    setBoard(nb);
  };
  const toggle=(i)=>{
    setHintIdx([]);
    if(sel.includes(i)){ setSel(sel.filter(x=>x!==i)); return; }
    const ns=[...sel,i];
    if(ns.length<3){ setSel(ns); setFlash({type:"idle",msg:""}); return; }
    const [a,b,c]=ns.map(ix=>board[ix]);
    if(isSet(a,b,c)){ setFound(f=>f+1); setFlash({type:"ok",msg:"Valid Set — three fresh cards dealt."}); setSel([]); replaceFound(ns); }
    else{ setMisses(m=>m+1); setWrong(ns); setFlash({type:"err",msg:"Not a Set — one feature is two-alike, one-different."}); setTimeout(()=>{setWrong([]);setSel([]);},650); }
  };
  const hint=()=>{
    if(info.sets.length){ setHintIdx([info.sets[0][0]]); setFlash({type:"idle",msg:"Highlighted one card that belongs to a Set."}); }
    else setFlash({type:"idle",msg:"No Set on the board — deal again."});
  };

  return (<div className="game">
    <div className="stripbar">
      <div className="stat"><div className="v" style={{color:"var(--magenta)"}}>{found}</div><div className="l">found</div></div>
      <div className="stat"><div className="v">{misses}</div><div className="l">misses</div></div>
      <div className="stat"><div className="v">{info.total}</div><div className="l">sets on board</div></div>
    </div>
    <div className="setgrid">
      {board.map((card,i)=>(<SetCard key={i} card={card} selected={sel.includes(i)} wrong={wrong.includes(i)} hint={hintIdx.includes(i)} onClick={()=>toggle(i)} />))}
    </div>
    <div className="actions">
      <button className="btn primary" onClick={hint}>Hint</button>
      <button className="btn ghost" onClick={newBoard}>Deal new board →</button>
    </div>
    {(flash.type!=="idle"||flash.msg) && <div className={"msg "+(flash.type==="idle"?"":flash.type)}>{flash.msg}</div>}
    <details className="rules"><summary>What makes a Set?</summary>
      <p>Pick three cards. For each feature — <b>number</b>, <b>color</b>, <b>shape</b>, <b>shading</b> — the three must be all same or all different. If any feature has exactly two alike, it's not a Set.</p>
    </details>
  </div>);
}

/* ---------- app shell ---------- */
function App(){
  const [active,setActive]=useState("twentyfour");
  return (<div className="field">
    <div className="rivets tl"><span className="rivet"/><span className="rivet pale"/></div>
    <div className="rivets tr"><span className="rivet pale"/><span className="rivet"/></div>
    <div className="rivets bl"><span className="rivet"/><span className="rivet pale"/></div>
    <div className="rivets br"><span className="rivet pale"/><span className="rivet"/></div>

    <div className="plate">
      <header className="head">
        <div className="badge"><Rays inner={12} outer={44} halfw={16} n={7} /><span className="num">&#8721;</span></div>
        <div><h1>Math Games Trainer</h1><p>Drill the classics. More games coming soon.</p></div>
      </header>
      <nav className="tabs">
        {GAMES.map(g=>(
          <button key={g.id} className="tab" data-active={active===g.id} onClick={()=>setActive(g.id)}>
            <span className="nm">{g.name}</span><span className="tag">{g.tag}</span>
          </button>
        ))}
        <div className="tab soon" aria-disabled><span className="nm">+</span><span className="tag">add more</span></div>
      </nav>
      <main className="stage">
        {active==="twentyfour" && <Game24/>}
        {active==="set" && <GameSet/>}
      </main>
      <footer className="foot">Built to grow — new games slot into the registry.</footer>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
